openapi: 3.0.3
info:
  title: Skripsi BE API
  version: 1.0.0
  description: |
    Dokumentasi endpoint utama untuk proyek Laravel Skripsi BE.

    Format response API:
    - sukses: `success=true`, `message`, `data` (opsional `meta` untuk pagination)
    - error: `success=false`, `message`, dan `errors` (untuk validation error)
servers:
  - url: http://127.0.0.1:8000
    description: Local development
tags:
  - name: Auth
  - name: Student - Orders
  - name: Student - Enrollments
  - name: Student - Forum
  - name: Student - Review
  - name: Student - Certificate
  - name: Admin - Category
  - name: Admin - Course
  - name: Admin - Order
  - name: Admin - Role
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullname, email, password, password_confirmation, role_id]
              properties:
                fullname:
                  type: string
                  example: Student User
                email:
                  type: string
                  format: email
                  example: student.new@example.com
                password:
                  type: string
                  format: password
                  example: password123
                password_confirmation:
                  type: string
                  format: password
                  example: password123
                role_id:
                  type: integer
                  example: 3
      responses:
        '200':
          description: Register berhasil
          content:
            application/json:
              example:
                success: true
                message: Registration successful, please check your email for verification link
                data:
                  user:
                    id: 10
                    role_id: 3
                    fullname: Student User
                    email: student.new@example.com
                    is_active: true
                    created_at: '2026-04-19 11:10:00'
                    updated_at: '2026-04-19 11:10:00'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: student@example.com
                password:
                  type: string
                  format: password
                  example: password
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              example:
                success: true
                message: Login successfully
                data:
                  token: 1|sanctum_example_token
                  user:
                    id: 3
                    role_id: 3
                    fullname: Student User
                    email: student@example.com
                    is_active: true
                    created_at: '2026-03-11 12:00:00'
                    updated_at: '2026-03-11 12:00:00'
        '422':
          description: Kredensial tidak valid / akun tidak siap login
          content:
            application/json:
              examples:
                invalid_credentials:
                  value:
                    success: false
                    message: The given data was invalid.
                    errors:
                      email:
                        - Invalid credentials
                email_not_verified:
                  value:
                    success: false
                    message: The given data was invalid.
                    errors:
                      email:
                        - Email not verified

  /api/orders:
    get:
      tags: [Student - Orders]
      summary: List order milik user login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
              example:
                success: true
                message: Order history retrieved successfully
                data:
                  - id: 12
                    user_id: 3
                    voucher_id: null
                    order_code: ORD-20260419-1A2B3C4
                    subtotal: 300000
                    discount: 0
                    tax: 0
                    admin_fee: 0
                    grand_total: 300000
                    status: pending
                    created_at: '2026-04-19 13:00:00'
                    updated_at: '2026-04-19 13:00:00'
                    items: []
                    transactions: []
                meta:
                  current_page: 1
                  last_page: 1
                  per_page: 10
                  total: 1
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Student - Orders]
      summary: Buat order baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_ids]
              properties:
                course_ids:
                  type: array
                  items:
                    type: integer
                  example: [1, 2]
                payment_method:
                  type: string
                  enum: [manual, gateway]
                  example: manual
                voucher_code:
                  type: string
                  nullable: true
                  example: HEMAT50
                note:
                  type: string
                  nullable: true
                  example: Mohon proses cepat
      responses:
        '201':
          description: Order dibuat
          content:
            application/json:
              example:
                success: true
                message: Order created successfully. Please complete the payment.
                data:
                  id: 15
                  user_id: 3
                  voucher_id: null
                  order_code: ORD-20260419-7F2C11A
                  subtotal: 250000
                  discount: 0
                  tax: 0
                  admin_fee: 0
                  grand_total: 250000
                  status: pending
                  created_at: '2026-04-19 13:20:00'
                  updated_at: '2026-04-19 13:20:00'
                  items: []
                  transactions: []
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: Validasi / aturan bisnis gagal
          content:
            application/json:
              examples:
                validation_error:
                  value:
                    success: false
                    message: The given data was invalid.
                    errors:
                      course_ids:
                        - The course ids field is required.
                duplicate_pending_order:
                  value:
                    success: false
                    message: "User already has a pending order for course ID: 1. Please complete or cancel the previous order."

  /api/orders/{id}:
    get:
      tags: [Student - Orders]
      summary: Detail order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Detail order berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Order tidak ditemukan
          content:
            application/json:
              example:
                success: false
                message: Order not found or access denied

  /api/enrollments/{id}/progress-summary:
    get:
      tags: [Student - Enrollments]
      summary: Ringkasan progress enrollment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Progress summary
          content:
            application/json:
              example:
                success: true
                message: Enrollment progress summary retrieved successfully
                data:
                  enrollment_id: 7
                  total_lessons: 10
                  completed_lessons: 4
                  remaining_lessons: 6
                  progress: 40
                  status: active
                  completed_at: null
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/enrollments/{enrollmentId}/lesson-progress/{lessonId}:
    put:
      tags: [Student - Enrollments]
      summary: Simpan/update progress lesson
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: integer
        - in: path
          name: lessonId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                progress_seconds:
                  type: integer
                  minimum: 0
                  example: 480
                completed_at:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2026-04-19 14:00:00'
      responses:
        '200':
          description: Progress berhasil disimpan
          content:
            application/json:
              example:
                success: true
                message: Lesson progress saved successfully
                data:
                  id: 33
                  enrollment_id: 7
                  lesson_id: 10
                  progress_seconds: 480
                  last_accessed_at: '2026-04-19 13:44:12'
                  completed_at: null
                  created_at: '2026-04-19 13:44:12'
                  updated_at: '2026-04-19 13:44:12'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/enrollments/{enrollmentId}/quizzes/{quizId}/attempts/{attemptId}/submit:
    post:
      tags: [Student - Enrollments]
      summary: Submit attempt quiz
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: integer
        - in: path
          name: quizId
          required: true
          schema:
            type: integer
        - in: path
          name: attemptId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Attempt tersubmit
          content:
            application/json:
              example:
                success: true
                message: Quiz attempt submitted successfully
                data:
                  id: 101
                  enrollment_id: 7
                  quiz_id: 8
                  total_score: 70
                  status: graded
                  started_at: '2026-04-19 13:50:00'
                  submitted_at: '2026-04-19 13:59:59'
                  answers: []
                  created_at: '2026-04-19 13:50:00'
                  updated_at: '2026-04-19 13:59:59'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: Attempt tidak valid
          content:
            application/json:
              example:
                success: false
                message: The given data was invalid.
                errors:
                  attempt_id:
                    - Attempt cannot be submitted without answers

  /api/courses/{courseId}/forum:
    post:
      tags: [Student - Forum]
      summary: Buat forum post
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  example: Pertanyaan tentang quiz final
                content:
                  type: string
                  example: Ada tips agar tidak gagal saat submit?
      responses:
        '201':
          description: Forum post dibuat
          content:
            application/json:
              example:
                success: true
                message: Forum post created successfully
                data:
                  id: 20
                  course_id: 1
                  user_id: 3
                  title: Pertanyaan tentang quiz final
                  content: Ada tips agar tidak gagal saat submit?
                  is_pinned: false
                  replies_count: null
                  user: null
                  course: null
                  replies: []
                  created_at: '2026-04-19 14:10:00'
                  updated_at: '2026-04-19 14:10:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/courses/{courseId}/reviews:
    post:
      tags: [Student - Review]
      summary: Kirim review course (harus completed)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                review:
                  type: string
                  nullable: true
                  example: Materinya mudah diikuti.
      responses:
        '201':
          description: Review berhasil dibuat
          content:
            application/json:
              example:
                success: true
                message: Review submitted successfully
                data:
                  id: 88
                  user_id: 3
                  course_id: 1
                  enrollment_id: 7
                  rating: 5
                  review: Materinya mudah diikuti.
                  user: null
                  course: null
                  created_at: '2026-04-19 14:41:00'
                  updated_at: '2026-04-19 14:41:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/enrollments/{enrollmentId}/certificate:
    post:
      tags: [Student - Certificate]
      summary: Generate certificate
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: enrollmentId
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Certificate generated
          content:
            application/json:
              example:
                success: true
                message: Certificate generated successfully
                data:
                  id: 5
                  user_id: 3
                  course_id: 1
                  enrollment_id: 7
                  certificate_number: CERT-20260419-6612B2B9153B2
                  certificate_url: http://127.0.0.1:8000/certificates/CERT-20260419-6612B2B9153B2.pdf
                  issued_at: '2026-04-19 15:05:00'
                  expired_at: null
                  user: null
                  course: null
                  created_at: '2026-04-19 15:05:00'
                  updated_at: '2026-04-19 15:05:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/admin/categories:
    get:
      tags: [Admin - Category]
      summary: List kategori
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Admin - Category]
      summary: Buat kategori
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Web Development
                description:
                  type: string
                  nullable: true
                  example: Kategori untuk topik web
      responses:
        '200':
          description: Category dibuat
          content:
            application/json:
              example:
                success: true
                message: Category created successfully
                data:
                  id: 4
                  name: Web Development
                  slug: web-development
                  description: Kategori untuk topik web
                  created_at: '2026-04-19 15:10:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/admin/courses:
    get:
      tags: [Admin - Course]
      summary: List course
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Course list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Course'
                  meta:
                    $ref: '#/components/schemas/PaginatedMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [Admin - Course]
      summary: Buat course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, category_id, instructor_id, price, status]
              properties:
                title:
                  type: string
                  example: Laravel Fundamental
                description:
                  type: string
                  nullable: true
                category_id:
                  type: integer
                  example: 1
                instructor_id:
                  type: integer
                  example: 2
                price:
                  type: number
                  format: float
                  example: 300000
                discount_price:
                  type: number
                  format: float
                  nullable: true
                  example: 250000
                thumbnail:
                  type: string
                  format: binary
                status:
                  type: string
                  enum: [draft, published, archived]
                  example: published
                requirements:
                  type: string
                  nullable: true
                outcomes:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Course berhasil dibuat
          content:
            application/json:
              example:
                success: true
                message: Course created successfully
                data:
                  id: 21
                  title: Laravel Fundamental
                  slug: laravel-fundamental
                  description: Belajar Laravel dari dasar
                  category_id: 1
                  instructor_id: 2
                  price: 300000
                  discount_price: 250000
                  thumbnail: null
                  status: published
                  requirements: Dasar komputer
                  outcomes: Paham membuat API
                  created_at: '2026-04-19 15:20:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/admin/orders/{id}/status:
    patch:
      tags: [Admin - Order]
      summary: Update status order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, completed, cancelled]
                  example: completed
      responses:
        '200':
          description: Status order berhasil diubah
          content:
            application/json:
              example:
                success: true
                message: Order status updated successfully
                data:
                  id: 30
                  user_id: 3
                  voucher_id: null
                  order_code: ORD-20260419-AB123CD
                  subtotal: 300000
                  discount: 0
                  tax: 0
                  admin_fee: 0
                  grand_total: 300000
                  status: completed
                  created_at: '2026-04-19 15:40:00'
                  updated_at: '2026-04-19 15:44:00'
                  items: []
                  transactions: []
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/admin/roles:
    get:
      tags: [Admin - Role]
      summary: List role
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              example:
                success: true
                message: Role list retrieved successfully
                data:
                  - id: 1
                    name: admin
                    created_at: '2026-03-11 10:00:00'
                    updated_at: '2026-03-11 10:00:00'
                  - id: 2
                    name: instructor
                    created_at: '2026-03-11 10:00:00'
                    updated_at: '2026-03-11 10:00:00'
                  - id: 3
                    name: user
                    created_at: '2026-03-11 10:00:00'
                    updated_at: '2026-03-11 10:00:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token

  responses:
    UnauthorizedError:
      description: Token tidak ada / tidak valid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Unauthenticated

    ValidationError:
      description: Error validasi input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: The given data was invalid.
            errors:
              email:
                - The email field is required.

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Server error

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PaginatedMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 3
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 25

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Programming
        slug:
          type: string
          example: programming
        description:
          type: string
          nullable: true
          example: Kategori programming
        created_at:
          type: string
          example: '2026-03-15 10:00:00'

    Course:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Laravel API Mastery
        slug:
          type: string
          example: laravel-api-mastery
        description:
          type: string
          nullable: true
          example: Belajar REST API dengan Laravel
        category_id:
          type: integer
          example: 1
        instructor_id:
          type: integer
          example: 2
        price:
          type: number
          example: 300000
        discount_price:
          type: number
          nullable: true
          example: 250000
        thumbnail:
          type: string
          nullable: true
        status:
          type: string
          example: published
        requirements:
          type: string
          nullable: true
        outcomes:
          type: string
          nullable: true
        created_at:
          type: string
          example: '2026-03-15 10:00:00'

    Transaction:
      type: object
      properties:
        id:
          type: integer
          example: 19
        order_id:
          type: integer
          example: 12
        invoice_code:
          type: string
          example: INV-20260419-A12BC3D
        amount:
          type: number
          example: 250000
        status:
          type: string
          example: pending
        paid_at:
          type: string
          nullable: true
        expired_at:
          type: string
          nullable: true

    OrderItem:
      type: object
      properties:
        id:
          type: integer
          example: 40
        order_id:
          type: integer
          example: 12
        course_id:
          type: integer
          example: 1
        price:
          type: number
          example: 250000

    Order:
      type: object
      properties:
        id:
          type: integer
          example: 12
        user_id:
          type: integer
          example: 3
        voucher_id:
          type: integer
          nullable: true
          example: null
        order_code:
          type: string
          example: ORD-20260419-1A2B3C4
        subtotal:
          type: number
          example: 250000
        discount:
          type: number
          example: 0
        tax:
          type: number
          example: 0
        admin_fee:
          type: number
          example: 0
        grand_total:
          type: number
          example: 250000
        status:
          type: string
          example: pending
        created_at:
          type: string
          example: '2026-04-19 13:00:00'
        updated_at:
          type: string
          example: '2026-04-19 13:00:00'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
